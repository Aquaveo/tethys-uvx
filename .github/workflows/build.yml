name: build base image

# Builds the tethys-uvx base and publishes the `builder` and `runtime` targets to GHCR.
# Tags per target: <target> (moving), <target>-<short-sha>, and <target>-<git-tag> on releases.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [builder, runtime-base, runtime]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/tethys-uvx"   # registry names must be lowercase
          SHA="${GITHUB_SHA::7}"
          TAGS="${IMAGE}:${{ matrix.target }},${IMAGE}:${{ matrix.target }}-${SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS},${IMAGE}:${{ matrix.target }}-${GITHUB_REF_NAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push (${{ matrix.target }})
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

# NOTE: the first publish creates a PRIVATE GHCR package. Make it public once via
# GitHub -> Packages -> tethys-uvx -> Package settings -> Change visibility -> Public.
